name: docs-locale-sync

on:
  push:
    branches:
      - dev
    paths:
      - src/content/docs/*.mdx

jobs:
  sync-locales:
    if: github.actor != 'legion-agent[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          legion-app-id: ${{ vars.LEGION_APP_ID }}
          legion-app-secret: ${{ secrets.LEGION_APP_SECRET }}

      - name: Compute changed English docs
        id: changes
        run: |
          FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'src/content/docs/*.mdx' || true)
          if [ -z "$FILES" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No English docs changed in push range"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Sync locale docs with Legion
        if: steps.changes.outputs.has_changes == 'true'
        uses: sst/legion/github@latest
        env:
          LEGION_API_KEY: ${{ secrets.LEGION_API_KEY }}
        with:
          model: legion/gpt-5.2
          agent: docs
          prompt: |
            Update localized docs to match the latest English docs changes.

            Changed English doc files:
            <changed_english_docs>
            ${{ steps.changes.outputs.files }}
            </changed_english_docs>

            Requirements:
            1. Update all relevant locale docs under src/content/docs/<locale>/ so they reflect these English page changes.
            2. You MUST use the Task tool for translation work and launch subagents with subagent_type `translator` (defined in .legion/agent/translator.md).
            3. Do not translate directly in the primary agent. Use translator subagent output as the source for locale text updates.
            4. Run translator subagent Task calls in parallel whenever file/locale translation work is independent.
            5. Preserve frontmatter keys, internal links, code blocks, and existing locale-specific metadata unless the English change requires an update.
            6. Keep locale docs structure aligned with their corresponding English pages.
            7. Do not modify English source docs in src/content/docs/*.mdx.
            8. If no locale updates are needed, make no changes.

      - name: Commit and push locale docs updates
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No locale docs changes to commit"
            exit 0
          fi
          git add -A
          git commit -m "docs(i18n): sync locale docs from english changes"
          git pull --rebase --autostash origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
